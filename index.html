<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영천고 급식</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root {
  --bg: #f5f7fa; --surface: #ffffff; --surface2: #edf0f5; --surface3: #e2e6f0;
  --border: #e2e6f0; --border2: #cdd3e4;
  --text: #1a1d24; --text2: #5a6474; --text3: #949db1;
  --accent: #3b82f6; --accent-l: #eff6ff; --accent-d: #2563eb;
  --red: #ef4444; --red-l: #fef2f2;
  --gold: #f59e0b; --gold-l: #fffbeb;
  --green: #10b981; --green-l: #ecfdf5;
  --sh: 0 4px 24px rgba(0,0,0,0.04);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.08);
  --radius-lg: 20px; --radius-md: 14px; --radius-sm: 10px;
  --glass-bg: rgba(255,255,255,0.7);
  --glass-border: rgba(255,255,255,0.3);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.dark {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --surface3: #2f3445;
  --border: #2f3445; --border2: #3d4459;
  --text: #f0f2f5; --text2: #9ba4b5; --text3: #6b758a;
  --accent: #60a5fa; --accent-l: #1e3a5f;
  --red: #f87171; --red-l: #3f1d1d;
  --gold: #fbbf24; --gold-l: #3f2e10;
  --green: #34d399; --green-l: #064e3b;
  --sh: 0 4px 24px rgba(0,0,0,0.4);
  --sh-lg: 0 12px 40px rgba(0,0,0,0.6);
  --glass-bg: rgba(26,29,39,0.8);
  --glass-border: rgba(255,255,255,0.1);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background .3s ease, color .3s ease; overflow-x: hidden; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

/* 헤더 - 글래스모피즘 */
.hdr { padding: 28px 0 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; position: sticky; top: 0; z-index: 100; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); margin-left: -24px; margin-right: -24px; padding-left: 24px; padding-right: 24px; }
.logo { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; display: flex; align-items: center; gap: 8px; }
.logo em { color: var(--accent); font-style: normal; }
.logo::before { content: '🍱'; font-size: 24px; }
.hdr-right { display: flex; align-items: center; gap: 10px; }

/* 날짜 네비 */
.date-nav { display: flex; align-items: center; gap: 4px; position: relative; background: var(--surface); padding: 6px 10px; border-radius: var(--radius-md); box-shadow: var(--sh); border: 1px solid var(--border); transition: var(--transition); }
.date-nav:hover { box-shadow: var(--sh-lg); transform: translateY(-1px); }.nav-btn { background: none; border: none; color: var(--text3); width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); border-radius: var(--radius-sm); }
.nav-btn:hover { color: var(--accent); background: var(--accent-l); transform: scale(1.1); }
.nav-btn:active { transform: scale(0.95); }
.date-center { cursor: pointer; padding: 0 14px; text-align: center; user-select: none; }
.date-main { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
.date-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 500; }
.today-btn { font-family: inherit; font-size: 12px; font-weight: 600; background: var(--accent-l); color: var(--accent); border: none; padding: 7px 14px; cursor: pointer; transition: var(--transition); border-radius: var(--radius-sm); white-space: nowrap; }
.today-btn:hover { background: var(--accent); color: #fff; transform: scale(1.05); }
.theme-btn { background: var(--surface); border: 1px solid var(--border); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; border-radius: var(--radius-md); box-shadow: var(--sh); transition: var(--transition); }
.theme-btn:hover { transform: scale(1.1) rotate(15deg); box-shadow: var(--sh-lg); }

/* 달력 팝업 - 글래스모피즘 */
.cal-popup { display: none; position: absolute; top: calc(100% + 12px); left: 50%; transform: translateX(-50%); background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--sh-lg); z-index: 999; width: 300px; }
.cal-popup.show { display: block; animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px) scale(0.95); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }
.cal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.cal-top button { background: var(--surface2); border: none; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; padding: 6px 12px; border-radius: var(--radius-sm); transition: var(--transition); }
.cal-top button:hover { background: var(--accent); color: #fff; }
.cal-top span { font-size: 15px; font-weight: 700; }
.cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 600; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-d { text-align: center; font-size: 13px; padding: 9px 0; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; transition: var(--transition); }
.cal-d:hover:not(.off):not(.empty) { background: var(--accent-l); color: var(--accent); transform: scale(1.1); }
.cal-d.today { background: var(--gold-l); color: var(--gold); font-weight: 700; }
.cal-d.sel { background: var(--accent) !important; color: #fff !important; font-weight: 700; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
.cal-d.off { color: var(--border2); cursor: default; }

/* Bento UI 탭 */
.meal-tabs { display: flex; background: var(--surface); padding: 6px; border-radius: var(--radius-md); margin-bottom: 20px; gap: 6px; box-shadow: var(--sh); border: 1px solid var(--border); }
.meal-tab { flex: 1; padding: 13px 0; border: none; background: transparent; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; border-radius: calc(var(--radius-md) - 6px); transition: var(--transition); position: relative; overflow: hidden; }
.meal-tab.on { background: var(--accent); color: #fff; font-weight: 700; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
.meal-tab:hover:not(.on) { color: var(--accent); background: var(--accent-l); }

/* 칼로리 칩 */
.kcal-chip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 13px; font-weight: 700; color: var(--gold); background: var(--gold-l); border-radius: 20px; opacity: 0; visibility: hidden; margin-bottom: 16px; transition: var(--transition); transform: translateY(10px); border: 1px solid var(--gold); }
.kcal-chip.show { opacity: 1; visibility: visible; transform: translateY(0); }

/* Bento 그리드 레이아웃 */
.bento-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
.left-col { display: flex; flex-direction: column; gap: 20px; }
.right-col { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 100px; }

/* 카드 공통 - 글래스모피즘 */
.ui-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--sh); overflow: hidden; transition: var(--transition); }
.ui-card:hover { box-shadow: var(--sh-lg); }

/* 검색 바 */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); color: var(--text); font-family: inherit; font-size: 14px; padding: 14px 16px 14px 44px; outline: none; transition: var(--transition); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-l); }.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text3); }

/* 메뉴 리스트 */
.menu-list { min-height: 320px; }
.menu-row { border-bottom: 1px solid var(--border); transition: var(--transition); }
.menu-row:last-child { border-bottom: none; }
.menu-row.warn { background: var(--red-l); }
.menu-row-main { display: flex; align-items: center; padding: 16px 20px; gap: 12px; cursor: pointer; transition: var(--transition); }
.menu-row-main:hover { background: var(--surface2); padding-left: 24px; }
.menu-row.warn .menu-row-main:hover { background: rgba(239, 68, 68, 0.08); }
.dish-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; line-height: 1.4; transition: var(--transition); }
.dish-name.main-dish { color: var(--accent); font-weight: 700; font-size: 16px; }
.dish-name:hover { color: var(--accent); }
.fav-btn { background: none; border: none; font-size: 20px; cursor: pointer; transition: var(--transition); padding: 4px; }
.fav-btn:hover { transform: scale(1.2); }
.fav-btn.active { color: var(--red); }

/* 별점 미리보기 */
.star-preview { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; min-width: 70px; }
.sp-stars { font-size: 12px; line-height: 1; letter-spacing: 1px; color: var(--border2); }
.sp-stars .f { color: var(--gold); }
.sp-bottom { display: flex; align-items: baseline; gap: 4px; }
.sp-val { font-size: 13px; font-weight: 700; color: var(--text); }
.sp-count { font-size: 11px; color: var(--text3); }
.sp-none { font-size: 12px; color: var(--border2); letter-spacing: 1px; }

/* 모달 - 데스크톱 중앙, 모바일 바텀시트 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; opacity: 0; transition: opacity .3s; }
.modal-overlay.show { display: flex; opacity: 1; }
.modal-sheet { background: var(--surface); border-radius: var(--radius-lg); width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 0 0 32px; transform: scale(0.9); transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: var(--sh-lg); }
.modal-overlay.show .modal-sheet { transform: scale(1); }
.modal-handle { display: none; }
.modal-head { padding: 24px 24px 20px; border-bottom: 1px solid var(--border); }
.modal-dish-name { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.modal-actions { display: flex; gap: 8px; margin-left: auto; }
.modal-action-btn { background: var(--surface2); border: none; width: 36px; height: 36px; border-radius: var(--radius-sm); cursor: pointer; font-size: 16px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
.modal-action-btn:hover { background: var(--accent); color: #fff; transform: scale(1.1); }
.modal-stat { display: flex; align-items: center; gap: 16px; background: var(--surface2); padding: 18px; border-radius: var(--radius-md); }
.modal-stat-score { display: flex; flex-direction: column; align-items: center; padding-right: 16px; border-right: 1px solid var(--border2); }
.modal-avg { font-size: 38px; font-weight: 800; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
.modal-avg-max { font-size: 12px; color: var(--text3); margin-top: 4px; font-weight: 500; }
.modal-stat-detail { display: flex; flex-direction: column; gap: 4px; }
.modal-stars-big { font-size: 20px; letter-spacing: 2px; color: var(--border2); }
.modal-stars-big .f { color: var(--gold); }
.modal-count-txt { font-size: 13px; color: var(--text2); }
.modal-no-rating { font-size: 14px; color: var(--text3); padding: 8px 0; }
.modal-input-area { padding: 24px; border-bottom: 1px solid var(--border); }
.modal-input-label { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 14px; }
.star-row { display: flex; gap: 8px; margin-bottom: 16px; }
.si-star { font-size: 36px; cursor: pointer; color: var(--border2); transition: var(--transition); user-select: none; line-height: 1; }.si-star.on { color: var(--gold); transform: scale(1.15); }
.si-star:hover { transform: scale(1.2); }
.review-input, .review-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 14px; padding: 14px 16px; outline: none; transition: var(--transition); margin-bottom: 12px; }
.review-input:focus, .review-textarea:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-l); }
.review-textarea { resize: none; }
.modal-submit-row { display: flex; gap: 12px; margin-top: 8px; }
.btn-submit { flex: 1; font-family: inherit; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; border: none; padding: 14px 0; cursor: pointer; transition: var(--transition); border-radius: var(--radius-sm); }
.btn-submit:hover { background: var(--accent-d); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-cancel { font-family: inherit; font-size: 14px; font-weight: 600; background: var(--surface2); color: var(--text2); border: none; padding: 14px 24px; cursor: pointer; border-radius: var(--radius-sm); transition: var(--transition); }
.btn-cancel:hover { background: var(--border); color: var(--text); }
.modal-reviews { padding: 24px; }
.reviews-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.reviews-label { font-size: 16px; font-weight: 700; color: var(--text); }
.sort-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; transition: var(--transition); }
.sort-select:hover { border-color: var(--accent); }
.rv-item { padding: 16px; background: var(--surface2); border-radius: var(--radius-md); margin-bottom: 12px; transition: var(--transition); }
.rv-item:hover { transform: translateX(4px); }
.rv-item:last-child { margin-bottom: 0; }
.rv-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.rv-name { font-size: 13px; font-weight: 600; color: var(--text); }
.rv-stars { font-size: 13px; letter-spacing: 1px; color: var(--border2); }
.rv-stars .f { color: var(--gold); }
.rv-score { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-l); padding: 2px 6px; border-radius: 4px; }
.rv-comment { font-size: 14px; color: var(--text); line-height: 1.5; word-break: break-all; }
.rv-actions { display: flex; gap: 8px; margin-top: 10px; }
.rv-action-btn { background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; transition: var(--transition); padding: 4px 8px; border-radius: 4px; }
.rv-action-btn:hover { background: var(--surface3); color: var(--text); }
.rv-action-btn.liked { color: var(--red); }
.rv-empty { font-size: 14px; color: var(--text3); padding: 24px 0; text-align: center; background: var(--surface2); border-radius: var(--radius-md); }

/* 주간 패널 - Bento 스타일 */
.week-panel-title { font-size: 15px; font-weight: 700; color: var(--text); padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.week-panel-title::before { content: '📅'; font-size: 18px; }
.week-day { padding: 16px 20px; border-bottom: 1px solid var(--border); transition: var(--transition); }
.week-day:last-child { border-bottom: none; }
.week-day.clickable { cursor: pointer; }
.week-day.clickable:hover { background: var(--surface2); padding-left: 24px; }
.week-day.no-meal { opacity: 0.5; }
.week-day.wd-today { background: var(--accent-l); border-left: 3px solid var(--accent); padding-left: 17px; }
.week-day.wd-sel { background: var(--surface2); }
.wd-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.wd-date { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.wd-dayname { font-size: 12px; color: var(--text2); font-weight: 600; }
.wd-badge { font-size: 11px; font-weight: 700; background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 8px; margin-left: auto; }
.wd-items { font-size: 13px; color: var(--text); line-height: 1.6; }
.wd-none { font-size: 13px; color: var(--text3); }
.wd-loading { font-size: 13px; color: var(--text3); padding: 24px; text-align: center; }

/* 인기 메뉴 TOP 3 */.popular-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--sh); overflow: hidden; }
.popular-title { font-size: 15px; font-weight: 700; color: var(--text); padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.popular-title::before { content: '🔥'; font-size: 18px; }
.popular-item { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; transition: var(--transition); cursor: pointer; }
.popular-item:last-child { border-bottom: none; }
.popular-item:hover { background: var(--surface2); }
.popular-rank { font-size: 18px; font-weight: 800; color: var(--gold); min-width: 28px; }
.popular-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
.popular-score { font-size: 13px; font-weight: 700; color: var(--accent); }

/* 알레르기 설정 패널 - 접을 수 있게 */
.allergy-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--sh); overflow: hidden; }
.allergy-hdr { font-size: 15px; font-weight: 700; color: var(--text); padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: var(--transition); }
.allergy-hdr:hover { background: var(--surface2); }
.allergy-hdr::before { content: '⚠️'; font-size: 18px; margin-right: 8px; }
.allergy-toggle { font-size: 12px; color: var(--text3); transition: var(--transition); }
.allergy-hdr.collapsed .allergy-toggle { transform: rotate(-90deg); }
.a-desc { font-size: 12px; color: var(--text3); padding: 12px 20px; background: var(--surface2); }
.a-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; padding: 16px 20px 20px; transition: var(--transition); }
.a-grid.collapsed { display: none; }
.a-item { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: var(--transition); user-select: none; }
.a-item:hover { border-color: var(--accent); transform: scale(1.05); }
.a-item.on { background: var(--red-l); border-color: var(--red); color: var(--red); }
.a-num { font-size: 11px; font-weight: 700; color: var(--text3); }
.a-item.on .a-num { color: var(--red); }
.a-lbl { font-size: 13px; font-weight: 600; color: var(--text2); }
.a-item.on .a-lbl { color: var(--red); }

/* 상태/토스트/스켈레톤 */
.state-box { padding: 60px 0; text-align: center; font-size: 15px; color: var(--text2); font-weight: 500; }
.skeleton { display: flex; flex-direction: column; }
.sk-row { display: flex; align-items: center; padding: 20px; gap: 16px; border-bottom: 1px solid var(--border); }
.sk-name { height: 18px; border-radius: 6px; background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: sk 1.5s infinite; flex: 1; }
.sk-star { height: 14px; width: 80px; border-radius: 6px; background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: sk 1.5s infinite; }
@keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); color: var(--text); border-radius: 30px; padding: 14px 28px; font-size: 14px; font-weight: 600; opacity: 0; transition: all .3s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; z-index: 9999; box-shadow: var(--sh-lg); border: 1px solid var(--border); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 모바일 반응형 */
@media(max-width: 768px) {
  .bento-grid { grid-template-columns: 1fr; }
  .right-col { position: static; }
  .a-grid { grid-template-columns: repeat(3, 1fr); }
  .modal-sheet { border-radius: 20px 20px 0 0; width: 100%; max-width: 100%; max-height: 90vh; align-self: flex-end; }
  .modal-overlay { align-items: flex-end; }
  .modal-handle { display: block; }
  .hdr { padding: 20px 16px; }
  .wrap { padding: 0 16px 60px; }
  .logo { font-size: 18px; }
  .date-nav { padding: 4px 8px; }  .date-main { font-size: 13px; }
}

/* 접근성 */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {

function lsGet(k)     { try{return localStorage.getItem(k)}catch{return null} }

function escapeHtml(unsafe) {
  if(!unsafe) return '';
  return String(unsafe)
    .replace(/&/g, "&")
    .replace(/</g, "<")
    .replace(/>/g, ">")
    .replace(/"/g, """)
    .replace(/'/g, "&#039;");
}

function starsHtml(score, max=5){
  return Array.from({length:max},(_,i)=>
    `<span class="${i<Math.round(score)?'f':'e'}">★</span>`

}

  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {

function parseItems(raw){
  return raw.split(/<br\s*\/>/i).map(s=>s.trim()).filter(Boolean).map(s=>{
    let name = s;
    let nums = [];
    const bracketRegex = /\(([^)]+)\)/g;
    let match;
    while ((match = bracketRegex.exec(s)) !== null) {
      const inside = match[1];
      const extracted = inside.split('.').map(x => x.trim()).filter(x => x && !isNaN(x));
      if (extracted.length > 0) nums.push(...extracted);
    }
    name = name.replace(/\([^)]*\)/g, '').trim();
    return {name, nums};
  });
}

function findMain(list){
  const flt=/^(밥|국|탕|찌개|김치|깍두기|단무지|우유|요구르트|주스|과일|푸딩|피클|양념|소스|드레싱|잼|버터)/;
  const kws=[
    {r:/볶음|구이|튀김|조림|가스|카츠|찜|스테이크|치킨|립/,s:10},
    {r:/닭|돈육|우육|돼지|소고기|오리|고기|베이컨|소시지|햄|오징어|새우|낙지|쭈꾸미/,s:8},
    {r:/파스타|스파게티|면|떡볶이|그라탕/,s:5}
  ];
  let max=-99,idx=0;  list.forEach((item,i)=>{
    let sc=0;
    if(flt.test(item.name)) sc-=50;
    kws.forEach(k=>{if(k.r.test(item.name))sc+=k.s;});
    sc+=Math.min(item.name.length,10)*.5;
    if(sc>max){max=sc;idx=i;}
  });
  return (max<0&&list.length>2)?2:idx;
}

function renderMenu(parsed, dateStr, mealType){
  lastParsed=parsed;
  const list=$('menuList');
  if(!parsed||!parsed.length){
    list.innerHTML='<div class="state-box">식단 정보가 없습니다</div>'; return;
  }
  
  // 검색 필터링
  let filtered = parsed;
  if (searchQuery) {    filtered = parsed.filter(item => item.name.toLowerCase().includes(searchQuery));
  }
  
  if (!filtered.length) {
    list.innerHTML='<div class="state-box">검색 결과가 없습니다</div>'; return;
  }
  
  const mainIdx=findMain(filtered);
  list.innerHTML='';
  filtered.forEach((item,i)=>{
    const key=dishKey(dateStr, mealType, item.name);
    const hasA=item.nums.some(n=>myA.has(n));
    const stat=avgStat(key);
    const isFav = favorites.has(item.name);
    const row=document.createElement('div');
    row.className='menu-row'+(hasA?' warn':'');
    row.setAttribute('role', 'listitem');

    let dishNameHtml = escapeHtml(item.name);
    if(hasA && item.nums.length > 0) {
      dishNameHtml += ` <span style="font-size:11px; color:var(--text3); font-weight:700; margin-left:6px; background:var(--surface); padding:2px 4px; border-radius:4px; border:1px solid var(--border);">${item.nums.join(', ')}</span>`;
    }

    const spHtml=stat
      ?`<div class="star-preview">
          <div class="sp-stars">${starsHtml(stat.avg)}</div>
          <div class="sp-bottom"><span class="sp-val">${stat.avg.toFixed(1)}</span><span class="sp-count">(${stat.count})</span></div>
        </div>`
      :`<div class="star-preview"><div class="sp-none">미평가</div></div>`;

    row.innerHTML=`<div class="menu-row-main">
      <button class="fav-btn ${isFav?'active':''}" data-name="${escapeHtml(item.name)}" aria-label="${isFav?'즐겨찾기 해제':'즐겨찾기 추가'}">${isFav?'❤️':'🤍'}</button>
      <span class="dish-name${i===mainIdx?' main-dish':''}">${dishNameHtml}</span>
      ${spHtml}
    </div>`;
    
    row.querySelector('.fav-btn').onclick = (e) => {
      e.stopPropagation();
      const name = e.target.dataset.name;

        e.target.textContent = '🤍';
        e.target.classList.remove('active');
        e.target.setAttribute('aria-label', '즐겨찾기 추가');
      } else {
        favorites.add(name);
        e.target.textContent = '❤️';
        e.target.classList.add('active');
        e.target.setAttribute('aria-label', '즐겨찾기 해제');
      }      lsSet('yc_fav', JSON.stringify([...favorites]));
    };
    
    row.querySelector('.menu-row-main').onclick=()=>openModal(item.name, dateStr, mealType);
    list.appendChild(row);
  });
}

function avgStat(key){
  const r=ratings[key];
  if(!r||!r.count) return null;
  return {avg:r.total/r.count, count:r.count};
}

function renderModalStat(){
  const stat=avgStat(modalKey);
  const el=$('modalStat');
  if(stat){
    el.innerHTML=`
      <div class="modal-stat-score">
        <span class="modal-avg">${stat.avg.toFixed(1)}</span>        <span class="modal-avg-max">/ 5.0</span>
      </div>

  } else {
    el.innerHTML=`<span class="modal-no-rating">아직 평가가 없어요. 첫 번째 별점을 남겨주세요!</span>`;
  }
}

function renderReviewList(){
  const rl=$('reviewList');
  const r=ratings[modalKey];
  if(!r||!r.reviews||!r.reviews.length){
    rl.innerHTML='<div class="rv-empty">아직 등록된 리뷰가 없습니다.</div>'; return;
  }
  
  // 정렬
  let sortedReviews = [...r.reviews];
  switch(currentSort) {
    case 'highest':
      sortedReviews.sort((a, b) => b.score - a.score);
      break;
    case 'lowest':
      sortedReviews.sort((a, b) => a.score - b.score);
      break;
    case 'likes':
      sortedReviews.sort((a, b) => (b.likes || 0) - (a.likes || 0));
      break;
    default: // latest
      sortedReviews.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  }
  
  rl.innerHTML=sortedReviews.map(rv=>{
    const safeName = escapeHtml(rv.nickname || '익명');
    const safeComment = escapeHtml(rv.comment);
    const isLiked = rv.likedByMe || false;
    const likes = rv.likes || 0;
    return `
    <div class="rv-item" data-id="${rv.id || ''}">
      <div class="rv-top">
        <span class="rv-name">${safeName}</span>
        <span class="rv-stars">${starsHtml(rv.score)}</span>
        <span class="rv-score">${rv.score}</span>
      </div>
      ${safeComment ? `<div class="rv-comment">${safeComment}</div>` : ''}
      <div class="rv-actions">
        <button class="rv-action-btn like-btn ${isLiked?'liked':''}" data-id="${rv.id || ''}">
          ${isLiked?'❤️':'🤍'} ${likes}        </button>
      </div>
    </div>`
  }).join('');
  
  // 좋아요 버튼 이벤트
  rl.querySelectorAll('.like-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      if (!id) return;
      
      const review = r.reviews.find(rv => rv.id === id);
      if (!review) return;
      
      const isLiked = review.likedByMe || false;
      const newLikes = (review.likes || 0) + (isLiked ? -1 : 1);
      
      try {
        await updateDoc(doc(db, "ratings", id), {
          likes: newLikes
        });
        
        review.likes = newLikes;
        review.likedByMe = !isLiked;
        renderReviewList();
        showToast(isLiked ? '좋아요를 취소했습니다' : '좋아요를 눌렀습니다');
      } catch(e) {
        console.error(e);
        showToast('오류가 발생했습니다');
      }
    };
  });
}

// 공유 버튼
$('modalShareBtn').onclick = () => {
  const name = $('modalDishText').textContent;
  const dateStr = `${cur.getFullYear()}.${pad(cur.getMonth()+1)}.${pad(cur.getDate())}`;
  const text = `[영천고 급식] ${dateStr} ${['','조식','중식','석식'][mt]} - ${name}`;
  
  if (navigator.share) {
    navigator.share({
      title: '영천고 급식',
      text: text,
      url: window.location.href
    }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      showToast('클립보드에 복사되었습니다');
    }).catch(() => {
      showToast('공유할 수 없습니다');
    });
  }
};

async function fetchFirebaseRatings(parsed, dateStr, mealType){
  try {
    const promises = parsed.map(async (item) => {
      const key = dishKey(dateStr, mealType, item.name);
      const q = query(collection(db, "ratings"), where("dishKey", "==", key));
      const querySnapshot = await getDocs(q);
             let total = 0, count = 0, reviews = [];
      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        data.id = docSnap.id;
        total += data.score;
        count += 1;
        reviews.push(data);
      });
      reviews.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      if (count > 0) ratings[key] = { total, count, reviews };
    });
    await Promise.all(promises);
  } catch(e) { console.error("Firebase 로드 실패:", e); }
}

async function fetchMeal(snapDate, snapMt, silent){
  const dateStr = toStr(snapDate);
  const url=`${BASE}/mealServiceDietInfo?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=R10&SD_SCHUL_CODE=${SC}&MLSV_YMD=${dateStr}&MMEAL_SC_CODE=${snapMt}`;
  try{
    const res=await fetch(url);
    const json=await res.json();
    if(!json.mealServiceDietInfo || json.RESULT){
      if(!silent) $('menuList').innerHTML='<div class="state-box">해당 날짜의 식단 정보가 없습니다.</div>';
      return null;
    }
    const info = json.mealServiceDietInfo;
    const rowBlock = info.find(b => b && Array.isArray(b.row));
    if(!rowBlock || !rowBlock.row.length){
      if(!silent) $('menuList').innerHTML='<div class="state-box">식단 정보가 없습니다.</div>';
      return null;
    }
    const meal = rowBlock.row[0];
    if(!silent){
      if(meal.CAL_INFO){ $('kcalVal').textContent=meal.CAL_INFO.trim(); $('kcalChip').classList.add('show'); }
      else { $('kcalChip').classList.remove('show'); }
      const parsed = parseItems(meal.DDISH_NM||'');
      await fetchFirebaseRatings(parsed, dateStr, snapMt);
      renderMenu(parsed, dateStr, snapMt);
    }
    return meal;
  }catch(e){
    if(!silent) $('menuList').innerHTML='<div class="state-box">서버와 연결할 수 없습니다.</div>';
    return null;
  }
}

  const snapDate = new Date(cur);

  </div>`;

async function renderWeekPanel(){
  const snapCurStr = toStr(cur), snapMt = mt;
  const wc=$('weekContent');
  wc.innerHTML='<div class="wd-loading">식단을 불러오고 있습니다...</div>';
  const monday=new Date(cur);
  const dow=cur.getDay();
  monday.setDate(cur.getDate()+(dow===0?-6:1-dow));
  const todayStr=toStr(today());
  const days=Array.from({length:5},(_,i)=>{
    const d=new Date(monday); d.setDate(monday.getDate()+i); return d;
  });
  wc.innerHTML=days.map(d=>{
    const ds=toStr(d), isToday=ds===todayStr, isSel=ds===snapCurStr;
    return `<div class="week-day${isToday?' wd-today':''}${isSel?' wd-sel':''}" id="wd_${ds}">
      <div class="wd-top">
        <span class="wd-date">${d.getDate()}</span>
        <span class="wd-dayname">${DAYS[d.getDay()]}요일</span>
        ${isToday?'<span class="wd-badge">오늘</span>':''}
      </div>
      <div class="wd-items" id="wdi_${ds}">…</div>
    </div>`;
  }).join('');
  await Promise.all(days.map(async d=>{
    const ds=toStr(d);
    const meal=await fetchMeal(d, snapMt, true);
    const card=$(`wd_${ds}`), el=$(`wdi_${ds}`);
    if(!card||!el) return;
    if(meal){
      el.textContent=parseItems(meal.DDISH_NM||'').slice(0,3).map(x=>x.name).join(' · ')||'-';
      card.classList.add('clickable');
      card.onclick=()=>{ cur=new Date(d.getFullYear(),d.getMonth(),d.getDate()); drawDate(); loadCurrent(); renderWeekPanel(); };
    } else {
      el.className='wd-none'; el.textContent='식단 없음'; card.classList.add('no-meal');
    }
  }));
}

// 인기 메뉴 패널
async function renderPopularPanel() {
  const pc = $('popularContent');
  pc.innerHTML = '<div class="wd-loading">집계 중...</div>';
  
  try {    // 이번 주 월요일부터 일요일까지
    const monday = new Date(cur);
    const dow = cur.getDay();
    monday.setDate(cur.getDate() + (dow === 0 ? -6 : 1 - dow));
    
    const menuStats = {};
    
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const ds = toStr(d);
      
      for (let mealType = 1; mealType <= 3; mealType++) {
        const url = `${BASE}/mealServiceDietInfo?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=R10&SD_SCHUL_CODE=${SC}&MLSV_YMD=${ds}&MMEAL_SC_CODE=${mealType}`;
        try {
          const res = await fetch(url);
          const json = await res.json();
          if (!json.mealServiceDietInfo) continue;
          
          const rowBlock = json.mealServiceDietInfo.find(b => b && Array.isArray(b.row));
          if (!rowBlock || !rowBlock.row.length) continue;
          
          const meal = rowBlock.row[0];
          const parsed = parseItems(meal.DDISH_NM || '');
          
          for (const item of parsed) {
            const key = dishKey(ds, mealType, item.name);
            const stat = avgStat(key);
            if (stat && stat.count > 0) {
              if (!menuStats[item.name]) {
                menuStats[item.name] = { total: 0, count: 0, name: item.name };
              }
              menuStats[item.name].total += stat.avg * stat.count;
              menuStats[item.name].count += stat.count;
            }
          }
        } catch(e) {
          console.error(e);
        }
      }
    }
    
    const sorted = Object.values(menuStats)
      .map(m => ({ ...m, avg: m.total / m.count }))
      .sort((a, b) => b.avg - a.avg)
      .slice(0, 3);
    
    if (sorted.length === 0) {
      pc.innerHTML = '<div class="rv-empty">아직 데이터가 없습니다</div>';
      return;    }
    
    pc.innerHTML = sorted.map((m, i) => `
      <div class="popular-item">
        <span class="popular-rank">${i + 1}</span>
        <span class="popular-name">${escapeHtml(m.name)}</span>
        <span class="popular-score">${m.avg.toFixed(1)}⭐</span>
      </div>
    `).join('');
    
  } catch(e) {
    console.error(e);
    pc.innerHTML = '<div class="rv-empty">오류가 발생했습니다</div>';
  }
}

function drawCal(){
  const y=calView.getFullYear(), m=calView.getMonth();
  $('calMonth').textContent=`${y}.${pad(m+1)}`;
  const first=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate();
  const todayStr=toStr(today()), curStr=toStr(cur);
  let html='';
  for(let i=0;i<first;i++) html+=`<span class="cal-d empty"></span>`;
  for(let d=1;d<=last;d++){
    const dd=new Date(y,m,d), ds=toStr(dd);
    const off=dd.getDay()===0||dd.getDay()===6;
    html+=`<span class="cal-d${off?' off':''}${ds===todayStr?' today':''}${ds===curStr?' sel':''}" data-d="${ds}">${d}</span>`;
  }
  $('calGrid').innerHTML=html;
  $('calGrid').querySelectorAll('.cal-d:not(.off):not(.empty)').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const s=el.dataset.d;
      cur=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));
      drawDate(); loadCurrent(); renderWeekPanel(); renderPopularPanel();
      $('calPopup').classList.remove('show');
    };
  });
}
