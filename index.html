<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영천고 급식</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root {
  --bg: #f5f7fa; --surface: #ffffff; --surface2: #edf0f5;
  --border: #e2e6f0; --border2: #cdd3e4;
  --text: #1a1d24; --text2: #5a6474; --text3: #949db1;
  --accent: #3b82f6; --accent-l: #eff6ff; --accent-d: #2563eb;
  --red: #ef4444; --red-l: #fef2f2;
  --gold: #f59e0b; --gold-l: #fffbeb;
  --sh: 0 4px 24px rgba(0,0,0,0.04);
  --radius-lg: 16px; --radius-md: 12px; --radius-sm: 8px;
}
.dark {
  --bg: #12141a; --surface: #1e212b; --surface2: #2a2e3b;
  --border: #333848; --border2: #454c60;
  --text: #f0f2f5; --text2: #9ba4b5; --text3: #6b758a;
  --accent: #60a5fa; --accent-l: #1e3a5f;
  --red: #f87171; --red-l: #3f1d1d;
  --gold: #fbbf24; --gold-l: #3f2e10;
  --sh: 0 4px 24px rgba(0,0,0,0.4);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background .3s ease, color .3s ease; }
.wrap { max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }

/* 헤더 */
.hdr { padding: 32px 0 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; }
.logo em { color: var(--accent); font-style: normal; }
.hdr-right { display: flex; align-items: center; gap: 12px; }

/* 날짜 네비 */
.date-nav { display: flex; align-items: center; gap: 4px; position: relative; background: var(--surface); padding: 4px 8px; border-radius: var(--radius-md); box-shadow: var(--sh); border: 1px solid var(--border); }
.nav-btn { background: none; border: none; color: var(--text3); width: 32px; height: 32px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color .2s; border-radius: var(--radius-sm); }
.nav-btn:hover { color: var(--accent); background: var(--bg); }
.date-center { cursor: pointer; padding: 0 12px; text-align: center; user-select: none; }
.date-main { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.date-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 500; }
.today-btn { font-family: inherit; font-size: 12px; font-weight: 600; background: var(--accent-l); color: var(--accent); border: none; padding: 6px 14px; cursor: pointer; transition: all .2s; border-radius: var(--radius-sm); white-space: nowrap; }
.today-btn:hover { background: var(--accent); color: #fff; }
.theme-btn { background: var(--surface); border: 1px solid var(--border); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; border-radius: var(--radius-md); box-shadow: var(--sh); transition: all .2s; }
.theme-btn:hover { transform: scale(1.05); }

/* 달력 팝업 */
.cal-popup { display: none; position: absolute; top: calc(100% + 12px); left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); z-index: 999; width: 280px; }
.cal-popup.show { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
.cal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cal-top button { background: var(--surface2); border: none; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; padding: 4px 10px; border-radius: var(--radius-sm); transition: background .2s; }
.cal-top button:hover { background: var(--border); }
.cal-top span { font-size: 14px; font-weight: 700; }
.cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 600; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-d { text-align: center; font-size: 13px; padding: 8px 0; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; transition: all .2s; }
.cal-d:hover:not(.off):not(.empty) { background: var(--surface2); }
.cal-d.today { background: var(--gold-l); color: var(--gold); font-weight: 700; }
.cal-d.sel { background: var(--accent) !important; color: #fff !important; font-weight: 700; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
.cal-d.off { color: var(--border2); cursor: default; }

/* 탭 (모던 Pill 스타일) */
.meal-tabs { display: flex; background: var(--surface2); padding: 4px; border-radius: var(--radius-md); margin-bottom: 24px; gap: 4px; }
.meal-tab { flex: 1; padding: 12px 0; border: none; background: transparent; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; border-radius: calc(var(--radius-md) - 4px); transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); }
.meal-tab.on { background: var(--surface); color: var(--text); font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.meal-tab:hover:not(.on) { color: var(--text); }

/* 칼로리 */
.kcal-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 13px; font-weight: 700; color: var(--gold); background: var(--gold-l); border-radius: 20px; opacity: 0; visibility: hidden; margin-bottom: 16px; transition: all .3s; transform: translateY(10px); }
.kcal-chip.show { opacity: 1; visibility: visible; transform: translateY(0); }

/* 그리드 */
.main-grid { display: grid; grid-template-columns: 1fr 280px; gap: 24px; align-items: start; }
.left-col { display: flex; flex-direction: column; gap: 24px; }

/* 카드 공통 */
.ui-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--sh); overflow: hidden; }

/* 메뉴 */
.menu-list { min-height: 320px; }
.menu-row { border-bottom: 1px solid var(--border); transition: background .2s; }
.menu-row:last-child { border-bottom: none; }
.menu-row.warn { background: var(--red-l); }
.menu-row-main { display: flex; align-items: center; padding: 16px 20px; gap: 12px; cursor: pointer; }
.menu-row-main:hover { background: var(--surface2); }
.menu-row.warn .menu-row-main:hover { background: rgba(239, 68, 68, 0.08); }
.dish-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; line-height: 1.4; }
.dish-name.main-dish { color: var(--accent); font-weight: 700; font-size: 16px; }

/* 별점 미리보기 */
.star-preview { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; min-width: 65px; }
.sp-stars { font-size: 12px; line-height: 1; letter-spacing: 1px; color: var(--border2); }
.sp-stars .f { color: var(--gold); }
.sp-bottom { display: flex; align-items: baseline; gap: 4px; }
.sp-val { font-size: 13px; font-weight: 700; color: var(--text); }
.sp-count { font-size: 11px; color: var(--text3); }
.sp-none { font-size: 12px; color: var(--border2); letter-spacing: 1px; }

/* 모달 (바텀 시트 & 블러) */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 2000; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity .3s; }
.modal-overlay.show { display: flex; opacity: 1; }
.modal-sheet { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 0 0 32px; transform: translateY(100%); transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.15); }
.modal-overlay.show .modal-sheet { transform: translateY(0); }
.modal-handle { width: 48px; height: 5px; background: var(--border2); border-radius: 3px; margin: 16px auto; }
.modal-head { padding: 8px 24px 24px; border-bottom: 1px solid var(--border); }
.modal-dish-name { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 16px; }
.modal-stat { display: flex; align-items: center; gap: 16px; background: var(--surface2); padding: 16px; border-radius: var(--radius-md); }
.modal-stat-score { display: flex; flex-direction: column; align-items: center; padding-right: 16px; border-right: 1px solid var(--border2); }
.modal-avg { font-size: 36px; font-weight: 800; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
.modal-avg-max { font-size: 12px; color: var(--text3); margin-top: 4px; font-weight: 500; }
.modal-stat-detail { display: flex; flex-direction: column; gap: 4px; }
.modal-stars-big { font-size: 20px; letter-spacing: 2px; color: var(--border2); }
.modal-stars-big .f { color: var(--gold); }
.modal-count-txt { font-size: 13px; color: var(--text2); }
.modal-no-rating { font-size: 14px; color: var(--text3); padding: 8px 0; }
.modal-input-area { padding: 24px; border-bottom: 1px solid var(--border); }
.modal-input-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 12px; }
.star-row { display: flex; gap: 8px; margin-bottom: 16px; }
.si-star { font-size: 36px; cursor: pointer; color: var(--border2); transition: all .2s cubic-bezier(0.4, 0, 0.2, 1); user-select: none; line-height: 1; }
.si-star.on { color: var(--gold); transform: scale(1.1); }
.review-input, .review-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 14px; padding: 14px 16px; outline: none; transition: all .2s; margin-bottom: 12px; }
.review-input:focus, .review-textarea:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px var(--accent-l); }
.review-textarea { resize: none; }
.modal-submit-row { display: flex; gap: 12px; margin-top: 8px; }
.btn-submit { flex: 1; font-family: inherit; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; border: none; padding: 14px 0; cursor: pointer; transition: all .2s; border-radius: var(--radius-sm); }
.btn-submit:hover { background: var(--accent-d); }
.btn-cancel { font-family: inherit; font-size: 14px; font-weight: 600; background: var(--surface2); color: var(--text2); border: none; padding: 14px 24px; cursor: pointer; border-radius: var(--radius-sm); transition: background .2s; }
.btn-cancel:hover { background: var(--border); color: var(--text); }
.modal-reviews { padding: 24px; }
.reviews-label { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.rv-item { padding: 16px; background: var(--surface2); border-radius: var(--radius-md); margin-bottom: 12px; }
.rv-item:last-child { margin-bottom: 0; }
.rv-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.rv-name { font-size: 13px; font-weight: 600; color: var(--text); }
.rv-stars { font-size: 13px; letter-spacing: 1px; color: var(--border2); }
.rv-stars .f { color: var(--gold); }
.rv-score { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-l); padding: 2px 6px; border-radius: 4px; }
.rv-comment { font-size: 14px; color: var(--text); line-height: 1.5; word-break: break-all; }
.rv-empty { font-size: 14px; color: var(--text3); padding: 24px 0; text-align: center; background: var(--surface2); border-radius: var(--radius-md); }

/* 주간 패널 */
.week-panel-title { font-size: 14px; font-weight: 700; color: var(--text); padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
.week-day { padding: 16px 20px; border-bottom: 1px solid var(--border); transition: background .2s; }
.week-day:last-child { border-bottom: none; }
.week-day.clickable { cursor: pointer; }
.week-day.clickable:hover { background: var(--surface2); }
.week-day.no-meal { opacity: 0.5; }
.week-day.wd-today { background: var(--accent-l); border-left: 3px solid var(--accent); padding-left: 17px; }
.week-day.wd-sel { background: var(--surface2); }
.wd-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.wd-date { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.wd-dayname { font-size: 12px; color: var(--text2); font-weight: 600; }
.wd-badge { font-size: 11px; font-weight: 700; background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 8px; margin-left: auto; }
.wd-items { font-size: 13px; color: var(--text); line-height: 1.6; }
.wd-none { font-size: 13px; color: var(--text3); }
.wd-loading { font-size: 13px; color: var(--text3); padding: 24px; text-align: center; }

/* 알레르기 설정 패널 */
.allergy-hdr { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 16px; padding: 20px 20px 0; }
.a-desc { font-size: 12px; color: var(--text3); padding: 0 20px 16px; }
.a-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; padding: 0 20px 20px; }
.a-item { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: all .2s; user-select: none; }
.a-item:hover { border-color: var(--border2); }
.a-item.on { background: var(--red-l); border-color: var(--red); color: var(--red); }
.a-num { font-size: 11px; font-weight: 700; color: var(--text3); }
.a-item.on .a-num { color: var(--red); }
.a-lbl { font-size: 13px; font-weight: 600; color: var(--text2); }
.a-item.on .a-lbl { color: var(--red); }

/* 상태/토스트/스켈레톤 */
.state-box { padding: 60px 0; text-align: center; font-size: 15px; color: var(--text2); font-weight: 500; }
.skeleton { display: flex; flex-direction: column; }
.sk-row { display: flex; align-items: center; padding: 20px; gap: 16px; border-bottom: 1px solid var(--border); }
.sk-name { height: 18px; border-radius: 4px; background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: sk 1.5s infinite; flex: 1; }
.sk-star { height: 14px; width: 80px; border-radius: 4px; background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: sk 1.5s infinite; }
@keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: #222; color: #fff; border-radius: 30px; padding: 12px 24px; font-size: 14px; font-weight: 600; opacity: 0; transition: all .3s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media(max-width: 768px) {
  .main-grid { grid-template-columns: 1fr; }
  .a-grid { grid-template-columns: repeat(4, 1fr); }
  .modal-sheet { border-radius: 20px 20px 0 0; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">영천고 <em>급식</em></div>
    <div class="hdr-right">
      <div class="date-nav">
        <button class="nav-btn" id="prev">‹</button>
        <div class="date-center" id="dateWrap">
          <div class="date-main" id="dateMain">--</div>
          <div class="date-sub" id="dateSub">--</div>
        </div>
        <button class="nav-btn" id="next">›</button>
        <button class="today-btn" id="todayBtn">오늘</button>
        <div class="cal-popup" id="calPopup">
          <div class="cal-top">
            <button id="calPrev">이전</button>
            <span id="calMonth"></span>
            <button id="calNext">다음</button>
          </div>
          <div class="cal-dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>
      <button class="theme-btn" id="themeBtn" aria-label="테마 변경">🌙</button>
    </div>
  </div>

  <div class="meal-tabs">
    <button class="meal-tab" data-t="1">조식</button>
    <button class="meal-tab on" data-t="2">중식</button>
    <button class="meal-tab" data-t="3">석식</button>
  </div>

  <div class="kcal-chip" id="kcalChip">🔥 <span id="kcalVal"></span></div>

  <div class="main-grid">
    <div class="left-col">
      <div class="ui-card menu-list" id="menuList"><div class="state-box">불러오는 중...</div></div>
      <div class="ui-card allergy-wrap">
        <div class="allergy-hdr">알레르기 필터</div>
        <div class="a-desc">선택한 알레르기 유발 물질이 포함된 메뉴가 붉게 표시됩니다.</div>
        <div class="a-grid" id="allergyGrid"></div>
      </div>
    </div>
    <div class="ui-card week-panel" id="weekPanel">
      <div class="week-panel-title">이번 주 메뉴 미리보기</div>
      <div id="weekContent"><div class="wd-loading">식단을 불러오고 있습니다</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <div class="modal-dish-name" id="modalDishName"></div>
      <div class="modal-stat" id="modalStat"></div>
    </div>
    <div class="modal-input-area">
      <div class="modal-input-label">이 메뉴 어땠나요?</div>
      <div class="star-row" id="starRow">
        <span class="si-star" data-v="1">★</span>
        <span class="si-star" data-v="2">★</span>
        <span class="si-star" data-v="3">★</span>
        <span class="si-star" data-v="4">★</span>
        <span class="si-star" data-v="5">★</span>
      </div>
      <input type="text" class="review-input" id="reviewName" placeholder="닉네임 (미입력 시 '익명')" maxlength="15">
      <textarea class="review-textarea" id="reviewText" rows="2" placeholder="솔직한 평가를 남겨주세요 (선택)"></textarea>
      <div class="modal-submit-row">
        <button class="btn-cancel" id="btnCancel">닫기</button>
        <button class="btn-submit" id="btnSubmit">리뷰 등록</button>
      </div>
    </div>
    <div class="modal-reviews">
      <div class="reviews-label">학우들의 리뷰</div>
      <div id="reviewList"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

}
function showToast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function dishKey(dateStr, mealType, name){ return `${dateStr}_${mealType}_${name}`; }

/* 보안 강화를 위한 HTML 이스케이프 함수 */
function escapeHtml(unsafe) {
  if(!unsafe) return '';
  return String(unsafe)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function starsHtml(score, max=5){
  return Array.from({length:max},(_,i)=>
    `<span class="${i<Math.round(score)?'f':'e'}">★</span>`
  ).join('');
}

function applyTheme(){

  $('themeBtn').textContent = isDark?'☀️':'🌙';
}
const savedTheme = lsGet('yc_theme');
if (savedTheme === 'dark') isDark = true;

function drawDate(){
  $('dateMain').textContent=`${cur.getFullYear()}.${pad(cur.getMonth()+1)}.${pad(cur.getDate())}`;
  $('dateSub').textContent=DAYS[cur.getDay()]+'요일';
}

function parseItems(raw){
  return raw.split(/<br\s*\/>/i).map(s=>s.trim()).filter(Boolean).map(s=>{
    let name = s;
    let nums = [];
    const bracketRegex = /\(([^)]+)\)/g;
    let match;
    while ((match = bracketRegex.exec(s)) !== null) {
      const inside = match[1];
      const extracted = inside.split('.').map(x => x.trim()).filter(x => x && !isNaN(x));
      if (extracted.length > 0) nums.push(...extracted);
    }
    name = name.replace(/\([^)]*\)/g, '').trim();
    return {name, nums};
  });
}

function findMain(list){
  const flt=/^(밥|국|탕|찌개|김치|깍두기|단무지|우유|요구르트|주스|과일|푸딩|피클|양념|소스|드레싱|잼|버터)/;
  const kws=[
    {r:/볶음|구이|튀김|조림|가스|카츠|찜|스테이크|치킨|립/,s:10},
    {r:/닭|돈육|우육|돼지|소고기|오리|고기|베이컨|소시지|햄|오징어|새우|낙지|쭈꾸미/,s:8},
    {r:/파스타|스파게티|면|떡볶이|그라탕/,s:5}
  ];
  let max=-99,idx=0;
  list.forEach((item,i)=>{
    let sc=0;
    if(flt.test(item.name)) sc-=50;
    kws.forEach(k=>{if(k.r.test(item.name))sc+=k.s;});
    sc+=Math.min(item.name.length,10)*.5;
    if(sc>max){max=sc;idx=i;}
  });
  return (max<0&&list.length>2)?2:idx;
}

function buildAllergy(){
  const g=$('allergyGrid'); g.innerHTML='';
  AL.forEach(([n,l])=>{
    const el=document.createElement('div');
    el.className='a-item'+(myA.has(n)?' on':'');
    el.innerHTML=`<span class="a-num">${n}</span><span class="a-lbl">${l}</span>`;
    el.onclick=()=>{
      myA.has(n)?myA.delete(n):myA.add(n);
      el.classList.toggle('on');
      lsSet('yc_a',JSON.stringify([...myA]));
      renderMenu(lastParsed, toStr(cur), mt);
    };
    g.appendChild(el);
  });
}

function renderMenu(parsed, dateStr, mealType){
  lastParsed=parsed;
  const list=$('menuList');
  if(!parsed||!parsed.length){
    list.innerHTML='<div class="state-box">식단 정보가 없습니다</div>'; return;
  }
  const mainIdx=findMain(parsed);
  list.innerHTML='';
  parsed.forEach((item,i)=>{
    const key=dishKey(dateStr, mealType, item.name);
    const hasA=item.nums.some(n=>myA.has(n));
    const stat=avgStat(key);
    const row=document.createElement('div');
    row.className='menu-row'+(hasA?' warn':'');

    let dishNameHtml = escapeHtml(item.name);
    if(hasA && item.nums.length > 0) {
      dishNameHtml += ` <span style="font-size:11px; color:var(--text3); font-weight:700; margin-left:6px; background:var(--surface); padding:2px 4px; border-radius:4px; border:1px solid var(--border);">${item.nums.join(', ')}</span>`;
    }

    const spHtml=stat
      ?`<div class="star-preview">
          <div class="sp-stars">${starsHtml(stat.avg)}</div>
          <div class="sp-bottom"><span class="sp-val">${stat.avg.toFixed(1)}</span><span class="sp-count">(${stat.count})</span></div>
        </div>`
      :`<div class="star-preview"><div class="sp-none">미평가</div></div>`;

    row.innerHTML=`<div class="menu-row-main">
      <span class="dish-name${i===mainIdx?' main-dish':''}">${dishNameHtml}</span>
      ${spHtml}
    </div>`;
    row.querySelector('.menu-row-main').onclick=()=>openModal(item.name, dateStr, mealType);
    list.appendChild(row);
  });
}

function avgStat(key){
  const r=ratings[key];
  if(!r||!r.count) return null;
  return {avg:r.total/r.count, count:r.count};
}

let modalDateStr='', modalMealType=0;
function openModal(name, dateStr, mealType){
  modalKey=dishKey(dateStr, mealType, name);
  modalDateStr=dateStr; modalMealType=mealType;
  modalScore=0;
  $('modalDishName').textContent=name;
  $('reviewName').value=''; 
  $('reviewText').value='';
  updateStarUI(0);
  renderModalStat();
  renderReviewList();
  
  $('modalOverlay').style.display = 'flex';
  setTimeout(() => $('modalOverlay').classList.add('show'), 10);
  document.body.style.overflow='hidden';
}
function closeModal(){
  $('modalOverlay').classList.remove('show');
  setTimeout(() => {
    $('modalOverlay').style.display = 'none';
    document.body.style.overflow='';
  }, 300);
  renderMenu(lastParsed, toStr(cur), mt);
}

function renderModalStat(){
  const stat=avgStat(modalKey);
  const el=$('modalStat');
  if(stat){
    el.innerHTML=`
      <div class="modal-stat-score">
        <span class="modal-avg">${stat.avg.toFixed(1)}</span>
        <span class="modal-avg-max">/ 5.0</span>
      </div>
      <div class="modal-stat-detail">
        <div class="modal-stars-big">${starsHtml(stat.avg)}</div>
        <span class="modal-count-txt">${stat.count}명의 학우가 평가했습니다</span>
      </div>`;
  } else {
    el.innerHTML=`<span class="modal-no-rating">아직 평가가 없어요. 첫 번째 별점을 남겨주세요!</span>`;
  }
}

function renderReviewList(){
  const rl=$('reviewList');
  const r=ratings[modalKey];
  if(!r||!r.reviews||!r.reviews.length){
    rl.innerHTML='<div class="rv-empty">아직 등록된 리뷰가 없습니다.</div>'; return;
  }
  rl.innerHTML=r.reviews.map(rv=>{
    const safeName = escapeHtml(rv.nickname || '익명');
    const safeComment = escapeHtml(rv.comment);
    return `
    <div class="rv-item">
      <div class="rv-top">
        <span class="rv-name">${safeName}</span>
        <span class="rv-stars">${starsHtml(rv.score)}</span>
        <span class="rv-score">${rv.score}</span>
      </div>
      ${safeComment ? `<div class="rv-comment">${safeComment}</div>` : ''}
    </div>`
  }).join('');
}

function updateStarUI(v){
  document.querySelectorAll('.si-star').forEach(s=>s.classList.toggle('on',+s.dataset.v<=v));
}
document.querySelectorAll('.si-star').forEach(s=>{
  s.onmouseenter=()=>updateStarUI(+s.dataset.v);
  s.onclick=()=>{ modalScore=+s.dataset.v; updateStarUI(modalScore); };
});
$('starRow').onmouseleave=()=>updateStarUI(modalScore);

$('btnSubmit').onclick=async ()=>{
  if(!modalScore){ showToast('별점을 먼저 선택해주세요.'); return; }
   
  const nickname = $('reviewName').value.trim() || '익명';
  const comment = $('reviewText').value.trim();
   
  const newReview = { 
    dishKey: modalKey, 
    score: modalScore, 
    comment: comment, 
    nickname: nickname,
    createdAt: Date.now()
  };

  try {
    $('btnSubmit').disabled = true;
    $('btnSubmit').textContent = '등록 중...';
    await addDoc(collection(db, "ratings"), newReview);

    if(!ratings[modalKey]) ratings[modalKey]={total:0,count:0,reviews:[]};
    ratings[modalKey].total+=modalScore;
    ratings[modalKey].count+=1;
    ratings[modalKey].reviews.unshift(newReview);

    showToast(`리뷰가 등록되었습니다.`);
    modalScore=0; updateStarUI(0); $('reviewText').value=''; $('reviewName').value='';
    renderModalStat(); renderReviewList();
    renderMenu(lastParsed, toStr(cur), mt);
  } catch(e) {
    showToast('네트워크 오류로 저장하지 못했습니다.');
    console.error(e);
  } finally {
    $('btnSubmit').disabled = false;
    $('btnSubmit').textContent = '리뷰 등록';
  }
};
$('btnCancel').onclick=closeModal;
$('modalOverlay').onclick=e=>{ if(e.target===$('modalOverlay')) closeModal(); };

async function fetchFirebaseRatings(parsed, dateStr, mealType){
  try {
    const promises = parsed.map(async (item) => {
      const key = dishKey(dateStr, mealType, item.name);
      const q = query(collection(db, "ratings"), where("dishKey", "==", key));
      const querySnapshot = await getDocs(q);
       
      let total = 0, count = 0, reviews = [];
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        total += data.score;
        count += 1;
        reviews.push(data);
      });
      reviews.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      if (count > 0) ratings[key] = { total, count, reviews };
    });
    await Promise.all(promises);
  } catch(e) { console.error("Firebase 로드 실패:", e); }
}

async function fetchMeal(snapDate, snapMt, silent){
  const dateStr = toStr(snapDate);
  const url=`${BASE}/mealServiceDietInfo?KEY=${KEY}&Type=json&ATPT_OFCDC_SC_CODE=R10&SD_SCHUL_CODE=${SC}&MLSV_YMD=${dateStr}&MMEAL_SC_CODE=${snapMt}`;
  try{
    const res=await fetch(url);
    const json=await res.json();
    if(!json.mealServiceDietInfo || json.RESULT){
      if(!silent) $('menuList').innerHTML='<div class="state-box">해당 날짜의 식단 정보가 없습니다.</div>';
      return null;
    }
    const info = json.mealServiceDietInfo;
    const rowBlock = info.find(b => b && Array.isArray(b.row));
    if(!rowBlock || !rowBlock.row.length){
      if(!silent) $('menuList').innerHTML='<div class="state-box">식단 정보가 없습니다.</div>';
      return null;
    }
    const meal = rowBlock.row[0];
    if(!silent){
      if(meal.CAL_INFO){ $('kcalVal').textContent=meal.CAL_INFO.trim(); $('kcalChip').classList.add('show'); }
      else { $('kcalChip').classList.remove('show'); }
      const parsed = parseItems(meal.DDISH_NM||'');
      await fetchFirebaseRatings(parsed, dateStr, snapMt);
      renderMenu(parsed, dateStr, snapMt);
    }
    return meal;
  }catch(e){
    if(!silent) $('menuList').innerHTML='<div class="state-box">서버와 연결할 수 없습니다.</div>';
    return null;
  }
}

function loadCurrent(){
  const snapDate = new Date(cur);
  const snapMt   = mt;
  $('menuList').innerHTML=`<div class="skeleton">
    ${Array(6).fill('<div class="sk-row"><div class="sk-name"></div><div class="sk-star"></div></div>').join('')}
  </div>`;
  $('kcalChip').classList.remove('show');
  lastParsed=[];
  fetchMeal(snapDate, snapMt, false);
}

async function renderWeekPanel(){
  const snapCurStr = toStr(cur), snapMt = mt;
  const wc=$('weekContent');
  wc.innerHTML='<div class="wd-loading">식단을 불러오고 있습니다...</div>';
  const monday=new Date(cur);
  const dow=cur.getDay();
  monday.setDate(cur.getDate()+(dow===0?-6:1-dow));
  const todayStr=toStr(today());
  const days=Array.from({length:5},(_,i)=>{
    const d=new Date(monday); d.setDate(monday.getDate()+i); return d;
  });
  wc.innerHTML=days.map(d=>{
    const ds=toStr(d), isToday=ds===todayStr, isSel=ds===snapCurStr;
    return `<div class="week-day${isToday?' wd-today':''}${isSel?' wd-sel':''}" id="wd_${ds}">
      <div class="wd-top">
        <span class="wd-date">${d.getDate()}</span>
        <span class="wd-dayname">${DAYS[d.getDay()]}요일</span>
        ${isToday?'<span class="wd-badge">오늘</span>':''}
      </div>
      <div class="wd-items" id="wdi_${ds}">…</div>
    </div>`;
  }).join('');
  await Promise.all(days.map(async d=>{
    const ds=toStr(d);
    const meal=await fetchMeal(d, snapMt, true);
    const card=$(`wd_${ds}`), el=$(`wdi_${ds}`);
    if(!card||!el) return;
    if(meal){
      el.textContent=parseItems(meal.DDISH_NM||'').slice(0,3).map(x=>x.name).join(' · ')||'-';
      card.classList.add('clickable');
      card.onclick=()=>{ cur=new Date(d.getFullYear(),d.getMonth(),d.getDate()); drawDate(); loadCurrent(); renderWeekPanel(); };
    } else {
      el.className='wd-none'; el.textContent='식단 없음'; card.classList.add('no-meal');
    }
  }));
}

function drawCal(){
  const y=calView.getFullYear(), m=calView.getMonth();
  $('calMonth').textContent=`${y}.${pad(m+1)}`;
  const first=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate();
  const todayStr=toStr(today()), curStr=toStr(cur);
  let html='';
  for(let i=0;i<first;i++) html+=`<span class="cal-d empty"></span>`;
  for(let d=1;d<=last;d++){
    const dd=new Date(y,m,d), ds=toStr(dd);
    const off=dd.getDay()===0||dd.getDay()===6;
    html+=`<span class="cal-d${off?' off':''}${ds===todayStr?' today':''}${ds===curStr?' sel':''}" data-d="${ds}">${d}</span>`;
  }
  $('calGrid').innerHTML=html;
  $('calGrid').querySelectorAll('.cal-d:not(.off):not(.empty)').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const s=el.dataset.d;
      cur=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));
      drawDate(); loadCurrent(); renderWeekPanel();
      $('calPopup').classList.remove('show');
    };
  });
}

$('prev').onclick=()=>{
  const d=new Date(cur); d.setDate(d.getDate()-1);
  if(d.getDay()===0) d.setDate(d.getDate()-2);
  cur=d; drawDate(); loadCurrent(); renderWeekPanel();
};
$('next').onclick=()=>{
  const d=new Date(cur); d.setDate(d.getDate()+1);
  if(d.getDay()===6) d.setDate(d.getDate()+2);
  cur=d; drawDate(); loadCurrent(); renderWeekPanel();
};
$('todayBtn').onclick=()=>{ cur=today(); fixWE(cur); drawDate(); loadCurrent(); renderWeekPanel(); };
$('dateWrap').onclick=e=>{ e.stopPropagation(); calView=new Date(cur); drawCal(); $('calPopup').classList.toggle('show'); };
$('calPrev').onclick=e=>{ e.stopPropagation(); calView.setMonth(calView.getMonth()-1); drawCal(); };
$('calNext').onclick=e=>{ e.stopPropagation(); calView.setMonth(calView.getMonth()+1); drawCal(); };
document.addEventListener('click',()=>$('calPopup').classList.remove('show'));
$('calPopup').onclick=e=>e.stopPropagation();

document.querySelectorAll('.meal-tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.meal-tab').forEach(t=>t.classList.remove('on'));
    tab.classList.add('on'); mt=parseInt(tab.dataset.t);
    loadCurrent(); renderWeekPanel();
  };
});

buildAllergy();
drawDate();
loadCurrent();
renderWeekPanel();
</script>
